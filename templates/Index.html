<!DOCTYPE html>
<html>
<head>
<title>AI Trip Planner</title>

<style>

body{
font-family: Arial;
background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size: cover;
background-repeat: no-repeat;
margin:0;
padding:0;
}

.container{
width:400px;
margin:120px auto;
background: rgba(255,255,255,0.9);
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
color:#2c3e50;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
background:#27ae60;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#219150;
}

</style>
</head>

<body>

<div class="container">

<h2>🌍 AI Trip Planner</h2>

<form action="/plan" method="post">

<input type="text" name="state" placeholder="Enter State"><br>

<input type="text" name="city" placeholder="Enter City"><br>

<input type="number" name="days" placeholder="Number of Days"><br>

<button type="submit">Generate Trip ✈️</button>

</form>

</div>

</body>
</html>
