<!DOCTYPE html>
<html>
<head>

<style>

body{
font-family:Arial;
background:#f4f6f7;
text-align:center;
}

.card{
background:pink;
width:320px;
margin:20px auto;
padding:15px;
border-radius:8px;
box-shadow:0 0 6px gray;
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

button{
background:#3498db;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>🗺 Your Trip Plan</h2>

{% for place in itinerary %}

<div class="card">

<img src="{{ place.img }}">

<h3>{{ place.name }}</h3>

</div>

{% endfor %}

<br>

<a href="/">
<button>Plan Another Trip</button>
</a>

</body>
</html>
